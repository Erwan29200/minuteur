<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minuteur d'ambiance</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B1220">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg-deep:#0B1220;
    --bg-panel:#131B2E;
    --bg-panel-hi:#1B2540;
    --accent-amber:#E8A34D;
    --accent-mist:#7FA8C9;
    --text-soft:#E7E2D8;
    --muted:#5B6478;
    --ring-track:#232E48;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg-deep);
    color:var(--text-soft);
    font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans",sans-serif;
    overflow:hidden;
    touch-action:manipulation;
  }
  #app{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:28px 20px 24px;
    max-width:480px;
    margin:0 auto;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--muted);
    margin-top:6px;
  }
  /* Ring + time */
  .ring-wrap{
    position:relative;
    width:min(72vw,300px);
    height:min(72vw,300px);
    display:flex;align-items:center;justify-content:center;
    margin-top:6px;
  }
  svg.ring{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-track{fill:none;stroke:var(--ring-track);stroke-width:10;}
  .ring-progress{fill:none;stroke:var(--accent-amber);stroke-width:10;stroke-linecap:round;
    transition:stroke 0.6s ease;}
  .ring-progress.mist{stroke:var(--accent-mist);}
  .ring-center{
    position:absolute;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;
  }
  .time-display{
    font-family:Georgia,"Iowan Old Style","Noto Serif",serif;
    font-size:clamp(38px,11vw,54px);
    font-variant-numeric:tabular-nums;
    letter-spacing:.02em;
    color:var(--text-soft);
  }
  .glow-dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--accent-amber);
    box-shadow:0 0 12px 3px var(--accent-amber);
    animation:breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{opacity:.35;transform:scale(.8);}
    50%{opacity:1;transform:scale(1.15);}
  }
  /* Time adjust */
  .time-adjust{
    display:flex;gap:14px;margin-top:18px;
  }
  .adjust-btn{
    background:var(--bg-panel);
    border:1px solid var(--bg-panel-hi);
    color:var(--text-soft);
    border-radius:14px;
    padding:9px 16px;
    font-size:14px;
    font-weight:600;
    letter-spacing:.02em;
  }
  .adjust-btn:active{background:var(--bg-panel-hi);}
  /* Sound picker */
  .section-label{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted); align-self:flex-start; margin:0 0 10px 4px;
  }
  .sounds{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    width:100%;
  }
  .sound-chip{
    background:var(--bg-panel);
    border:1px solid var(--bg-panel-hi);
    border-radius:16px;
    padding:12px 6px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    color:var(--muted);
    font-size:11.5px;
    letter-spacing:.02em;
  }
  .sound-chip svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.6;}
  .sound-chip.active{
    border-color:var(--accent-amber);
    color:var(--text-soft);
    background:linear-gradient(180deg,rgba(232,163,77,.14),rgba(232,163,77,.03));
  }
  .sound-chip.active svg{stroke:var(--accent-amber);}
  /* Gong toggle row */
  .row{
    width:100%;
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-panel);
    border:1px solid var(--bg-panel-hi);
    border-radius:16px;
    padding:14px 16px;
  }
  .row .label{font-size:14px;color:var(--text-soft);}
  .row .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .switch{
    width:46px;height:27px;border-radius:20px;
    background:var(--ring-track);
    position:relative;
    border:1px solid var(--bg-panel-hi);
  }
  .switch::after{
    content:'';position:absolute;top:2px;left:2px;
    width:21px;height:21px;border-radius:50%;
    background:var(--muted);
    transition:transform .2s ease, background .2s ease;
  }
  .switch.on{background:rgba(232,163,77,.22);border-color:var(--accent-amber);}
  .switch.on::after{transform:translateX(19px);background:var(--accent-amber);}
  /* Controls */
  .controls{
    display:flex;gap:16px;align-items:center;margin-top:4px;
  }
  .btn-main{
    width:78px;height:78px;border-radius:50%;
    background:var(--accent-amber);
    border:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 24px rgba(232,163,77,.25);
  }
  .btn-main svg{width:28px;height:28px;fill:#0B1220;}
  .btn-secondary{
    width:54px;height:54px;border-radius:50%;
    background:var(--bg-panel);
    border:1px solid var(--bg-panel-hi);
    display:flex;align-items:center;justify-content:center;
  }
  .btn-secondary svg{width:20px;height:20px;stroke:var(--text-soft);fill:none;stroke-width:1.8;}
  .stack{width:100%;display:flex;flex-direction:column;gap:16px;}
</style>
</head>
<body>
<div id="app">

  <div class="eyebrow">Repos &amp; concentration</div>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="88"></circle>
      <circle id="ringProgress" class="ring-progress" cx="100" cy="100" r="88"
              stroke-dasharray="553" stroke-dashoffset="0"></circle>
    </svg>
    <div class="ring-center">
      <div id="timeDisplay" class="time-display">10:00</div>
      <div id="glowDot" class="glow-dot"></div>
    </div>
  </div>

  <div class="time-adjust" id="timeAdjust">
    <button class="adjust-btn" data-delta="-5">-5 min</button>
    <button class="adjust-btn" data-delta="-1">-1 min</button>
    <button class="adjust-btn" data-delta="1">+1 min</button>
    <button class="adjust-btn" data-delta="5">+5 min</button>
  </div>

  <div class="stack">
    <div>
      <div class="section-label">Ambiance sonore</div>
      <div class="sounds" id="sounds">
        <button class="sound-chip" data-sound="rain">
          <svg viewBox="0 0 24 24"><path d="M4 14a5 5 0 0 1 1-9.9A6 6 0 0 1 17 6a4.5 4.5 0 0 1 1 8.9"/><line x1="8" y1="17" x2="8" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="16" y1="17" x2="16" y2="21"/></svg>
          Pluie
        </button>
        <button class="sound-chip" data-sound="waves">
          <svg viewBox="0 0 24 24"><path d="M2 12c2 2 4 2 6 0s4-2 6 0 4 2 6 0"/><path d="M2 17c2 2 4 2 6 0s4-2 6 0 4 2 6 0"/></svg>
          Vagues
        </button>
        <button class="sound-chip" data-sound="fire">
          <svg viewBox="0 0 24 24"><path d="M12 2c2 3-1 4 0 7 1-1 2-2 2-2 1 3-1 5-2 6-2 1-5 0-6-3-1-3 1-5 2-7 0 2 1 3 2 3 0-2 1-3 2-4z"/></svg>
          Feu
        </button>
        <button class="sound-chip" data-sound="wind">
          <svg viewBox="0 0 24 24"><path d="M3 8h11a3 3 0 1 0-3-3"/><path d="M3 14h15a3 3 0 1 1-3 3"/><path d="M3 19h9"/></svg>
          Vent
        </button>
        <button class="sound-chip active" data-sound="none">
          <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><circle cx="12" cy="12" r="9"/></svg>
          Silence
        </button>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="label">Gong de fin</div>
        <div class="sub">Jouer un son à la fin du minuteur</div>
      </div>
      <div class="switch on" id="gongSwitch"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-secondary" id="resetBtn" title="Réinitialiser">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 8 8 8"/></svg>
    </button>
    <button class="btn-main" id="startBtn" title="Démarrer">
      <svg id="startIcon" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg>
    </button>
    <button class="btn-secondary" id="testGongBtn" title="Tester le gong">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </button>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---------- State ----------
  let totalSeconds = 10*60;
  let remaining = totalSeconds;
  let running = false;
  let intervalId = null;
  let endTimestamp = null;
  let selectedSound = "none";
  let gongEnabled = true;

  const timeDisplay = document.getElementById('timeDisplay');
  const ringProgress = document.getElementById('ringProgress');
  const RING_CIRC = 2 * Math.PI * 88;
  ringProgress.setAttribute('stroke-dasharray', RING_CIRC.toFixed(1));

  function formatTime(s){
    s = Math.max(0, Math.round(s));
    const m = Math.floor(s/60);
    const sec = s%60;
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  function updateDisplay(){
    timeDisplay.textContent = formatTime(remaining);
    const frac = totalSeconds > 0 ? (remaining/totalSeconds) : 0;
    const offset = RING_CIRC * (1 - frac);
    ringProgress.style.strokeDashoffset = offset.toFixed(1);
  }

  function setRingColor(){
    ringProgress.classList.toggle('mist', selectedSound === 'rain' || selectedSound === 'wind');
  }

  // ---------- Time adjust ----------
  document.getElementById('timeAdjust').addEventListener('click', (e)=>{
    const btn = e.target.closest('.adjust-btn');
    if(!btn || running) return;
    const delta = parseInt(btn.dataset.delta,10)*60;
    totalSeconds = Math.max(60, Math.min(180*60, totalSeconds + delta));
    remaining = totalSeconds;
    updateDisplay();
  });

  // ---------- Sound picker ----------
  const soundChips = document.querySelectorAll('.sound-chip');
  soundChips.forEach(chip=>{
    chip.addEventListener('click', ()=>{
      soundChips.forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      selectedSound = chip.dataset.sound;
      setRingColor();
      if(running) startAmbience(selectedSound);
    });
  });

  // ---------- Gong toggle ----------
  const gongSwitch = document.getElementById('gongSwitch');
  gongSwitch.addEventListener('click', ()=>{
    gongEnabled = !gongEnabled;
    gongSwitch.classList.toggle('on', gongEnabled);
  });

  // =====================================================
  //  AUDIO ENGINE
  // =====================================================
  let audioCtx = null;
  let ambienceNodes = null; // holds active nodes to stop later
  let masterGain = null;

  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.9;
      masterGain.connect(audioCtx.destination);
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  function makeNoiseBuffer(seconds, colorExponent){
    // colorExponent: 0 = white, ~1 = pinkish/brown (integrated) for warmer textures
    const len = Math.floor(audioCtx.sampleRate * seconds);
    const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    let last = 0;
    for(let i=0;i<len;i++){
      const white = Math.random()*2-1;
      if(colorExponent > 0){
        last = (last + colorExponent*0.02*white) / (1+colorExponent*0.02);
        // simple leaky integrator toward brown noise
        last = last*0.98 + white*0.02*colorExponent + white*(1-colorExponent)*0;
        data[i] = last;
      } else {
        data[i] = white;
      }
    }
    // normalize
    let max = 0;
    for(let i=0;i<len;i++) max = Math.max(max, Math.abs(data[i]));
    if(max>0) for(let i=0;i<len;i++) data[i] /= max;
    return buffer;
  }

  function stopAmbience(){
    if(ambienceNodes){
      const now = audioCtx.currentTime;
      try{
        ambienceNodes.gain.gain.cancelScheduledValues(now);
        ambienceNodes.gain.gain.setValueAtTime(ambienceNodes.gain.gain.value, now);
        ambienceNodes.gain.gain.linearRampToValueAtTime(0, now + 0.6);
      }catch(e){}
      const nodesToStop = ambienceNodes;
      setTimeout(()=>{
        (nodesToStop.sources||[]).forEach(s=>{ try{s.stop();}catch(e){} });
        nodesToStop.timers.forEach(t=>clearInterval(t));
      }, 700);
      ambienceNodes = null;
    }
  }

  function startAmbience(type){
    stopAmbience();
    if(type === 'none') return;
    ensureAudio();

    const out = audioCtx.createGain();
    out.gain.value = 0;
    out.connect(masterGain);
    const now = audioCtx.currentTime;
    out.gain.linearRampToValueAtTime(0.8, now + 1.2);

    const sources = [];
    const timers = [];

    if(type === 'rain'){
      const buf = makeNoiseBuffer(4, 0);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const bandpass = audioCtx.createBiquadFilter();
      bandpass.type = 'bandpass'; bandpass.frequency.value = 4200; bandpass.Q.value = 0.6;
      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass'; lowpass.frequency.value = 6500;
      const g = audioCtx.createGain(); g.gain.value = 0.9;
      src.connect(bandpass); bandpass.connect(lowpass); lowpass.connect(g); g.connect(out);
      src.start();
      sources.push(src);

      // low steady body layer
      const buf2 = makeNoiseBuffer(4, 0.5);
      const src2 = audioCtx.createBufferSource();
      src2.buffer = buf2; src2.loop = true;
      const lp2 = audioCtx.createBiquadFilter();
      lp2.type='lowpass'; lp2.frequency.value = 900;
      const g2 = audioCtx.createGain(); g2.gain.value = 0.5;
      src2.connect(lp2); lp2.connect(g2); g2.connect(out);
      src2.start();
      sources.push(src2);

    } else if(type === 'waves'){
      const buf = makeNoiseBuffer(6, 0.6);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass'; lowpass.frequency.value = 1200;
      const g = audioCtx.createGain(); g.gain.value = 0.8;
      src.connect(lowpass); lowpass.connect(g); g.connect(out);
      src.start();
      sources.push(src);

      // slow swell LFO on gain + cutoff
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.09;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.35;
      lfo.connect(lfoGain); lfoGain.connect(g.gain);
      lfo.start();
      sources.push(lfo);

      const lfo2 = audioCtx.createOscillator();
      lfo2.frequency.value = 0.07;
      const lfo2Gain = audioCtx.createGain();
      lfo2Gain.gain.value = 500;
      lfo2.connect(lfo2Gain); lfo2Gain.connect(lowpass.frequency);
      lfo2.start();
      sources.push(lfo2);

    } else if(type === 'fire'){
      const buf = makeNoiseBuffer(5, 0.85);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass'; lowpass.frequency.value = 500;
      const g = audioCtx.createGain(); g.gain.value = 0.9;
      src.connect(lowpass); lowpass.connect(g); g.connect(out);
      src.start();
      sources.push(src);

      // crackle pops
      function pop(){
        if(!ambienceNodes) return;
        const dur = 0.05 + Math.random()*0.05;
        const pbuf = makeNoiseBuffer(dur, 0);
        const psrc = audioCtx.createBufferSource();
        psrc.buffer = pbuf;
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 1500 + Math.random()*2000;
        const pg = audioCtx.createGain();
        const t0 = audioCtx.currentTime;
        pg.gain.setValueAtTime(0.0001, t0);
        pg.gain.exponentialRampToValueAtTime(0.5 + Math.random()*0.5, t0+0.005);
        pg.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
        psrc.connect(hp); hp.connect(pg); pg.connect(out);
        psrc.start();
        psrc.stop(t0+dur+0.02);
      }
      const timer = setInterval(()=>{
        if(Math.random() < 0.7) pop();
      }, 350);
      timers.push(timer);

    } else if(type === 'wind'){
      const buf = makeNoiseBuffer(6, 0.2);
      const src = audioCtx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass'; lowpass.frequency.value = 700;
      const g = audioCtx.createGain(); g.gain.value = 0.8;
      src.connect(lowpass); lowpass.connect(g); g.connect(out);
      src.start();
      sources.push(src);

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.05;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 450;
      lfo.connect(lfoGain); lfoGain.connect(lowpass.frequency);
      lfo.start();
      sources.push(lfo);

      const lfo2 = audioCtx.createOscillator();
      lfo2.frequency.value = 0.11;
      const lfo2Gain = audioCtx.createGain();
      lfo2Gain.gain.value = 0.25;
      lfo2.connect(lfo2Gain); lfo2Gain.connect(g.gain);
      lfo2.start();
      sources.push(lfo2);
    }

    ambienceNodes = { gain: out, sources, timers };
  }

  function playGong(){
    ensureAudio();
    const now = audioCtx.currentTime;
    const out = audioCtx.createGain();
    out.gain.value = 0.9;
    out.connect(masterGain);

    const fundamentals = [220, 330, 554, 740];
    fundamentals.forEach((f, i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f * (1 + (Math.random()-0.5)*0.01);
      const g = audioCtx.createGain();
      const peak = i===0 ? 0.6 : 0.6/(i+1.4);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(peak, now+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 5.5 + i*0.4);
      osc.connect(g); g.connect(out);
      osc.start(now);
      osc.stop(now + 6.5);
    });

    // strike transient
    const noiseBuf = makeNoiseBuffer(0.08, 0);
    const nsrc = audioCtx.createBufferSource();
    nsrc.buffer = noiseBuf;
    const hp = audioCtx.createBiquadFilter();
    hp.type='highpass'; hp.frequency.value = 800;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.5, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now+0.08);
    nsrc.connect(hp); hp.connect(ng); ng.connect(out);
    nsrc.start(now);
  }

  document.getElementById('testGongBtn').addEventListener('click', playGong);

  // =====================================================
  //  TIMER LOGIC
  // =====================================================
  const startBtn = document.getElementById('startBtn');
  const startIcon = document.getElementById('startIcon');

  function setIconPause(){
    startIcon.innerHTML = '<rect x="5" y="4" width="5" height="16" rx="1"></rect><rect x="14" y="4" width="5" height="16" rx="1"></rect>';
  }
  function setIconPlay(){
    startIcon.innerHTML = '<path d="M6 4l14 8-14 8z"></path>';
  }

  function tick(){
    const now = Date.now();
    remaining = Math.max(0, (endTimestamp - now)/1000);
    updateDisplay();
    if(remaining <= 0){
      finishTimer();
    }
  }

  function finishTimer(){
    running = false;
    clearInterval(intervalId);
    intervalId = null;
    remaining = 0;
    updateDisplay();
    setIconPlay();
    stopAmbience();
    if(gongEnabled) playGong();
  }

  function startTimer(){
    ensureAudio();
    if(remaining <= 0) remaining = totalSeconds;
    endTimestamp = Date.now() + remaining*1000;
    running = true;
    setIconPause();
    startAmbience(selectedSound);
    intervalId = setInterval(tick, 250);
  }

  function pauseTimer(){
    running = false;
    clearInterval(intervalId);
    intervalId = null;
    setIconPlay();
    stopAmbience();
  }

  startBtn.addEventListener('click', ()=>{
    if(running) pauseTimer();
    else startTimer();
  });

  document.getElementById('resetBtn').addEventListener('click', ()=>{
    pauseTimer();
    remaining = totalSeconds;
    updateDisplay();
  });

  setRingColor();
  updateDisplay();

  // ---------- PWA: enregistrement du service worker ----------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }

})();
</script>
</body>
</html>
